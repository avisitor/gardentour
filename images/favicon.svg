<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- ʻŌhiʻa Lehua Favicon - 32x32 with 12 stamens -->
  
  <!-- Background circle with green border -->
  <circle cx="16" cy="16" r="15" fill="#fef8f8" stroke="#2e7d32" stroke-width="1"/>
  
  <!-- Flower centered -->
  <g id="ohia-lehua" transform="translate(16, 16)">
    
    <!-- Radiating Stamens - 12 stamens at 30° intervals -->
    <g stroke="#d32f2f" stroke-width="1.8" stroke-linecap="round" fill="#ff5252">
      <!-- 0° (up) -->
      <line x1="0" y1="-4" x2="0" y2="-12"/>
      <circle cx="0" cy="-13" r="1.5"/>
      
      <!-- 30° -->
      <line x1="0" y1="-4" x2="0" y2="-11" transform="rotate(30)"/>
      <circle cx="0" cy="-12" r="1.3" transform="rotate(30)"/>
      
      <!-- 60° -->
      <line x1="0" y1="-4" x2="0" y2="-12" transform="rotate(60)"/>
      <circle cx="0" cy="-13" r="1.5" transform="rotate(60)"/>
      
      <!-- 90° (right) -->
      <line x1="0" y1="-4" x2="0" y2="-11" transform="rotate(90)"/>
      <circle cx="0" cy="-12" r="1.3" transform="rotate(90)"/>
      
      <!-- 120° -->
      <line x1="0" y1="-4" x2="0" y2="-12" transform="rotate(120)"/>
      <circle cx="0" cy="-13" r="1.5" transform="rotate(120)"/>
      
      <!-- 150° -->
      <line x1="0" y1="-4" x2="0" y2="-11" transform="rotate(150)"/>
      <circle cx="0" cy="-12" r="1.3" transform="rotate(150)"/>
      
      <!-- 180° (down) -->
      <line x1="0" y1="-4" x2="0" y2="-12" transform="rotate(180)"/>
      <circle cx="0" cy="-13" r="1.5" transform="rotate(180)"/>
      
      <!-- 210° -->
      <line x1="0" y1="-4" x2="0" y2="-11" transform="rotate(210)"/>
      <circle cx="0" cy="-12" r="1.3" transform="rotate(210)"/>
      
      <!-- 240° -->
      <line x1="0" y1="-4" x2="0" y2="-12" transform="rotate(240)"/>
      <circle cx="0" cy="-13" r="1.5" transform="rotate(240)"/>
      
      <!-- 270° (left) -->
      <line x1="0" y1="-4" x2="0" y2="-11" transform="rotate(270)"/>
      <circle cx="0" cy="-12" r="1.3" transform="rotate(270)"/>
      
      <!-- 300° -->
      <line x1="0" y1="-4" x2="0" y2="-12" transform="rotate(300)"/>
      <circle cx="0" cy="-13" r="1.5" transform="rotate(300)"/>
      
      <!-- 330° -->
      <line x1="0" y1="-4" x2="0" y2="-11" transform="rotate(330)"/>
      <circle cx="0" cy="-12" r="1.3" transform="rotate(330)"/>
    </g>
    
    <!-- Center of flower -->
    <circle cx="0" cy="0" r="4.5" fill="#ffccbc"/>
    <circle cx="0" cy="0" r="3" fill="#ffab91"/>
    <circle cx="0" cy="0" r="1.5" fill="#ff8a65"/>
  </g>
</svg>
