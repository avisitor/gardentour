<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" width="120" height="100">
  <!-- ʻŌhiʻa Lehua Flower - Stacked/Compact Version -->
  
  <!-- Flower centered in upper portion -->
  <g id="ohia-lehua" transform="translate(60, 38)">
    
    <!-- Outer glow/halo for depth -->
    <circle cx="0" cy="0" r="30" fill="#ffebee" opacity="0.4"/>
    
    <!-- Radiating Stamens - 20 stamens at 18° intervals -->
    <g stroke="#d32f2f" stroke-width="2.5" stroke-linecap="round" fill="#ff5252">
      <!-- 0° -->
      <line x1="0" y1="-7" x2="0" y2="-26"/>
      <circle cx="0" cy="-27" r="2.5"/>
      
      <!-- 18° -->
      <line x1="0" y1="-7" x2="0" y2="-22" transform="rotate(18)"/>
      <circle cx="0" cy="-23" r="2.2" transform="rotate(18)"/>
      
      <!-- 36° -->
      <line x1="0" y1="-7" x2="0" y2="-27" transform="rotate(36)"/>
      <circle cx="0" cy="-28" r="2.5" transform="rotate(36)"/>
      
      <!-- 54° -->
      <line x1="0" y1="-7" x2="0" y2="-22" transform="rotate(54)"/>
      <circle cx="0" cy="-23" r="2.2" transform="rotate(54)"/>
      
      <!-- 72° -->
      <line x1="0" y1="-7" x2="0" y2="-25" transform="rotate(72)"/>
      <circle cx="0" cy="-26" r="2.5" transform="rotate(72)"/>
      
      <!-- 90° -->
      <line x1="0" y1="-7" x2="0" y2="-23" transform="rotate(90)"/>
      <circle cx="0" cy="-24" r="2.2" transform="rotate(90)"/>
      
      <!-- 108° -->
      <line x1="0" y1="-7" x2="0" y2="-27" transform="rotate(108)"/>
      <circle cx="0" cy="-28" r="2.5" transform="rotate(108)"/>
      
      <!-- 126° -->
      <line x1="0" y1="-7" x2="0" y2="-21" transform="rotate(126)"/>
      <circle cx="0" cy="-22" r="2.2" transform="rotate(126)"/>
      
      <!-- 144° -->
      <line x1="0" y1="-7" x2="0" y2="-24" transform="rotate(144)"/>
      <circle cx="0" cy="-25" r="2.5" transform="rotate(144)"/>
      
      <!-- 162° -->
      <line x1="0" y1="-7" x2="0" y2="-25" transform="rotate(162)"/>
      <circle cx="0" cy="-26" r="2.2" transform="rotate(162)"/>
      
      <!-- 180° -->
      <line x1="0" y1="-7" x2="0" y2="-27" transform="rotate(180)"/>
      <circle cx="0" cy="-28" r="2.5" transform="rotate(180)"/>
      
      <!-- 198° -->
      <line x1="0" y1="-7" x2="0" y2="-22" transform="rotate(198)"/>
      <circle cx="0" cy="-23" r="2.2" transform="rotate(198)"/>
      
      <!-- 216° -->
      <line x1="0" y1="-7" x2="0" y2="-25" transform="rotate(216)"/>
      <circle cx="0" cy="-26" r="2.5" transform="rotate(216)"/>
      
      <!-- 234° -->
      <line x1="0" y1="-7" x2="0" y2="-23" transform="rotate(234)"/>
      <circle cx="0" cy="-24" r="2.2" transform="rotate(234)"/>
      
      <!-- 252° -->
      <line x1="0" y1="-7" x2="0" y2="-26" transform="rotate(252)"/>
      <circle cx="0" cy="-27" r="2.5" transform="rotate(252)"/>
      
      <!-- 270° -->
      <line x1="0" y1="-7" x2="0" y2="-24" transform="rotate(270)"/>
      <circle cx="0" cy="-25" r="2.5" transform="rotate(270)"/>
      
      <!-- 288° -->
      <line x1="0" y1="-7" x2="0" y2="-22" transform="rotate(288)"/>
      <circle cx="0" cy="-23" r="2.2" transform="rotate(288)"/>
      
      <!-- 306° -->
      <line x1="0" y1="-7" x2="0" y2="-25" transform="rotate(306)"/>
      <circle cx="0" cy="-26" r="2.5" transform="rotate(306)"/>
      
      <!-- 324° -->
      <line x1="0" y1="-7" x2="0" y2="-23" transform="rotate(324)"/>
      <circle cx="0" cy="-24" r="2.2" transform="rotate(324)"/>
      
      <!-- 342° -->
      <line x1="0" y1="-7" x2="0" y2="-24" transform="rotate(342)"/>
      <circle cx="0" cy="-25" r="2.2" transform="rotate(342)"/>
    </g>
    
    <!-- Center of flower - warm coral -->
    <circle cx="0" cy="0" r="9" fill="#ffccbc"/>
    <circle cx="0" cy="0" r="6" fill="#ffab91"/>
    <circle cx="0" cy="0" r="3" fill="#ff8a65"/>
    
  </g>
  
  <!-- Text: "Maui Garden Tour" - centered below -->
  <text x="60" y="88" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="700" fill="#1b5e20">Maui Garden Tour</text>
</svg>
