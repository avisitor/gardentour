<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" width="280" height="60">
  <defs>
    <!-- Gradient for stamens - darker at tips -->
    <linearGradient id="stamenGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ff8a80"/>
      <stop offset="100%" style="stop-color:#d32f2f"/>
    </linearGradient>
  </defs>
  
  <!-- ʻŌhiʻa Lehua Flower - Radiating Stamen Burst -->
  <g id="ohia-lehua" transform="translate(30, 30)">
    
    <!-- Outer glow/halo for depth -->
    <circle cx="0" cy="0" r="24" fill="#ffebee" opacity="0.5"/>
    
    <!-- Radiating Stamens - 20 stamens at 18° intervals -->
    <!-- Each stamen is a line with a small circle (anther) at the tip -->
    
    <!-- Stamen group - varying lengths for natural look -->
    <g stroke="#d32f2f" stroke-width="2" stroke-linecap="round" fill="#ff5252">
      <!-- 0° -->
      <line x1="0" y1="-6" x2="0" y2="-20"/>
      <circle cx="0" cy="-21" r="2"/>
      
      <!-- 18° -->
      <line x1="0" y1="-6" x2="5.5" y2="-17" transform="rotate(18)"/>
      <circle cx="0" cy="-18" r="1.8" transform="rotate(18)"/>
      
      <!-- 36° -->
      <line x1="0" y1="-6" x2="0" y2="-21"/>
      <circle cx="0" cy="-22" r="2" transform="rotate(36)"/>
      <line x1="0" y1="-6" x2="0" y2="-21" transform="rotate(36)"/>
      
      <!-- 54° -->
      <line x1="0" y1="-6" x2="0" y2="-17" transform="rotate(54)"/>
      <circle cx="0" cy="-18" r="1.8" transform="rotate(54)"/>
      
      <!-- 72° -->
      <line x1="0" y1="-6" x2="0" y2="-20" transform="rotate(72)"/>
      <circle cx="0" cy="-21" r="2" transform="rotate(72)"/>
      
      <!-- 90° -->
      <line x1="0" y1="-6" x2="0" y2="-18" transform="rotate(90)"/>
      <circle cx="0" cy="-19" r="1.8" transform="rotate(90)"/>
      
      <!-- 108° -->
      <line x1="0" y1="-6" x2="0" y2="-21" transform="rotate(108)"/>
      <circle cx="0" cy="-22" r="2" transform="rotate(108)"/>
      
      <!-- 126° -->
      <line x1="0" y1="-6" x2="0" y2="-17" transform="rotate(126)"/>
      <circle cx="0" cy="-18" r="1.8" transform="rotate(126)"/>
      
      <!-- 144° -->
      <line x1="0" y1="-6" x2="0" y2="-19" transform="rotate(144)"/>
      <circle cx="0" cy="-20" r="2" transform="rotate(144)"/>
      
      <!-- 162° -->
      <line x1="0" y1="-6" x2="0" y2="-20" transform="rotate(162)"/>
      <circle cx="0" cy="-21" r="1.8" transform="rotate(162)"/>
      
      <!-- 180° -->
      <line x1="0" y1="-6" x2="0" y2="-21" transform="rotate(180)"/>
      <circle cx="0" cy="-22" r="2" transform="rotate(180)"/>
      
      <!-- 198° -->
      <line x1="0" y1="-6" x2="0" y2="-17" transform="rotate(198)"/>
      <circle cx="0" cy="-18" r="1.8" transform="rotate(198)"/>
      
      <!-- 216° -->
      <line x1="0" y1="-6" x2="0" y2="-20" transform="rotate(216)"/>
      <circle cx="0" cy="-21" r="2" transform="rotate(216)"/>
      
      <!-- 234° -->
      <line x1="0" y1="-6" x2="0" y2="-18" transform="rotate(234)"/>
      <circle cx="0" cy="-19" r="1.8" transform="rotate(234)"/>
      
      <!-- 252° -->
      <line x1="0" y1="-6" x2="0" y2="-21" transform="rotate(252)"/>
      <circle cx="0" cy="-22" r="2" transform="rotate(252)"/>
      
      <!-- 270° -->
      <line x1="0" y1="-6" x2="0" y2="-19" transform="rotate(270)"/>
      <circle cx="0" cy="-20" r="2" transform="rotate(270)"/>
      
      <!-- 288° -->
      <line x1="0" y1="-6" x2="0" y2="-17" transform="rotate(288)"/>
      <circle cx="0" cy="-18" r="1.8" transform="rotate(288)"/>
      
      <!-- 306° -->
      <line x1="0" y1="-6" x2="0" y2="-20" transform="rotate(306)"/>
      <circle cx="0" cy="-21" r="2" transform="rotate(306)"/>
      
      <!-- 324° -->
      <line x1="0" y1="-6" x2="0" y2="-18" transform="rotate(324)"/>
      <circle cx="0" cy="-19" r="1.8" transform="rotate(324)"/>
      
      <!-- 342° -->
      <line x1="0" y1="-6" x2="0" y2="-19" transform="rotate(342)"/>
      <circle cx="0" cy="-20" r="1.8" transform="rotate(342)"/>
    </g>
    
    <!-- Center of flower - warm coral -->
    <circle cx="0" cy="0" r="7" fill="#ffccbc"/>
    <circle cx="0" cy="0" r="5" fill="#ffab91"/>
    <circle cx="0" cy="0" r="2.5" fill="#ff8a65"/>
    
  </g>
  
  <!-- Text: "Maui Garden Tour" -->
  <text x="62" y="26" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="700" fill="#1b5e20">Maui Garden Tour</text>
  
  <!-- Subtitle: "Native Hawaiian Plants" -->
  <text x="62" y="44" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="500" fill="#4caf50">Native Hawaiian Plants</text>
</svg>
